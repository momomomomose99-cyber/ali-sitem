<canvas id="heartCanvas"></canvas>

<style>
#heartCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:5;
}
</style>

<script>

const heartCanvas =
document.getElementById("heartCanvas");

const hctx =
heartCanvas.getContext("2d");

function resizeHeart(){

heartCanvas.width =
window.innerWidth;

heartCanvas.height =
window.innerHeight;

}

resizeHeart();

window.addEventListener(
"resize",
resizeHeart
);

let angle = 0;
let wave = 0;

function drawHeart(){

hctx.clearRect(
0,
0,
heartCanvas.width,
heartCanvas.height
);

const centerX =
heartCanvas.width/2;

const centerY =
heartCanvas.height/2;

const scale = 12;

for(let i=0;i<120;i++){

const t =
i*(Math.PI*2/120)
+ angle;

const x =
16*Math.pow(
Math.sin(t),
3
);

const y =
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);

const px =
centerX + x*scale;

const py =
centerY - y*scale;

const fade =
(Math.sin(
i*0.15 + wave
)+1)/2;

const red =
Math.floor(
255*fade
);

hctx.fillStyle =
`rgb(${red},0,0)`;

hctx.font =
"bold 12px Arial";

hctx.fillText(
"I LOVE YOU",
px,
py
);

}

angle += 0.01;
wave += 0.05;

requestAnimationFrame(
drawHeart
);

}

drawHeart();

</script>
