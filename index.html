<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Double Heart</title><style>
body{
margin:0;
overflow:hidden;
background:#000;
}

canvas{
display:block;
}

#start{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
z-index:10;
}
</style></head>
<body><div id="start">Touch Screen ❤️</div><audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio><canvas id="heartCanvas"></canvas>

<script>

const canvas =
document.getElementById("heartCanvas");

const ctx =
canvas.getContext("2d");

const music =
document.getElementById("bgMusic");

const start =
document.getElementById("start");

start.addEventListener("click",()=>{

music.play().catch(()=>{});

start.style.display="none";

});

function resize(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resize();

window.addEventListener(
"resize",
resize
);

let angle = 0;
let pulseTime = 0;

const stars = [];

for(let i=0;i<120;i++){

stars.push({

x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight,
size:Math.random()*2+1,
speed:Math.random()*1.5+0.5,
alpha:Math.random()

});

}

function drawStars(){

stars.forEach(star=>{

star.y += star.speed;

if(star.y > canvas.height){

star.y = -10;
star.x = Math.random()*canvas.width;

}

ctx.beginPath();

ctx.fillStyle =
`rgba(255,0,0,${star.alpha})`;

ctx.shadowBlur = 10;
ctx.shadowColor = "#ff0000";

ctx.arc(
star.x,
star.y,
star.size,
0,
Math.PI*2
);

ctx.fill();

});

}

function drawHeart(scale,textSize,offset){

for(let i=0;i<120;i++){

const t =
i*(Math.PI*2/120)
+ angle
+ offset;

const x =
16*Math.pow(
Math.sin(t),
3
);

const y =
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);

const px =
canvas.width/2
+ x*scale;

const py =
canvas.height/2
- y*scale;

const glow =
(
Math.sin(i*0.2+offset)
+1
)/2;

const red =
180 + glow*75;

ctx.shadowBlur = 30;
ctx.shadowColor = "#ff0000";

ctx.fillStyle =
`rgb(${red},0,0)`;

ctx.font =
`bold ${textSize}px Arial`;

ctx.textAlign =
"center";

ctx.fillText(
"I LOVE YOU",
px,
py
);

}

}

function animate(){

requestAnimationFrame(
animate
);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawStars();

const pulse =
1 +
Math.sin(
pulseTime
)*0.08;

drawHeart(
22*pulse,
15,
0
);

drawHeart(
18*pulse,
14,
1.5
);

pulseTime += 0.03;
angle += 0.003;

}

animate();

</script></body>
</html>
