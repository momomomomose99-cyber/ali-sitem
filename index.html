<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARYAN ❤️</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

canvas{
display:block;
}
</style>

</head>
<body>

<audio id="bgMusic" autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<canvas id="heartCanvas"></canvas>

<script>

const music = document.getElementById("bgMusic");

window.addEventListener("load",()=>{
music.play().catch(()=>{});
});

const canvas = document.getElementById("heartCanvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let angle = 0;
let wave = 0;

function draw(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

const scale = 20;

for(let i=0;i<100;i++){

const t =
i * (Math.PI * 2 / 100)
+ angle;

const x =
16 * Math.pow(
Math.sin(t),
3
);

const y =
13 * Math.cos(t)
- 5 * Math.cos(2*t)
- 2 * Math.cos(3*t)
- Math.cos(4*t);

const px = centerX + x * scale;
const py = centerY - y * scale;

const fade =
(
Math.sin(
i * 0.15 + wave
)
+ 1
) / 2;

const red =
Math.floor(
255 * fade
);

ctx.shadowBlur = 50;
ctx.shadowColor = "#ff0000";

ctx.fillStyle =
`rgb(${red},0,0)`;

ctx.font =
"bold 14px Arial";

ctx.textAlign =
"center";

ctx.fillText(
"I LOVE YOU",
px,
py
);

}

ctx.shadowBlur = 70;
ctx.shadowColor = "#ff0000";

ctx.fillStyle = "#ff2222";

ctx.font =
"bold 70px Arial";

ctx.textAlign =
"center";

ctx.fillText(
"ARYAN",
centerX,
centerY
);

angle += 0.003;
wave += 0.02;

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
