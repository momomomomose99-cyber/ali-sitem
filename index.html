<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Double Heart</title><style>
body{
margin:0;
overflow:hidden;
background:#000;
touch-action:manipulation;
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style></head>
<body><audio id="bgMusic" loop preload="auto">
<source src="song.mp3" type="audio/mpeg">
</audio><canvas id="heartCanvas"></canvas>

<script>

const music = document.getElementById("bgMusic");

function startMusic(){

music.play().catch(()=>{});

document.removeEventListener(
"touchstart",
startMusic
);

document.removeEventListener(
"click",
startMusic
);

}

document.addEventListener(
"touchstart",
startMusic
);

document.addEventListener(
"click",
startMusic
);

const canvas =
document.getElementById("heartCanvas");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resize();

window.addEventListener(
"resize",
resize
);

let wave = 0;

function drawHeart(scale,textSize,offset){

const centerX =
canvas.width/2;

const centerY =
canvas.height/2;

for(let i=0;i<120;i++){

const t =
i*(Math.PI*2/120);

const x =
16*Math.pow(
Math.sin(t),
3
);

const y =
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);

const px =
centerX + x*scale;

const py =
centerY - y*scale;

const glow =
(
Math.sin(
i*0.12+wave+offset
)+1
)/2;

const red =
180 +
Math.floor(
75*glow
);

ctx.shadowBlur = 35;
ctx.shadowColor = "#ff0000";

ctx.fillStyle =
`rgb(${red},0,0)`;

ctx.font =
"bold "+textSize+"px Arial";

ctx.textAlign =
"center";

ctx.fillText(
"I LOVE YOU",
px,
py
);

}

}

function animate(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawHeart(
22,
15,
0
);

drawHeart(
18,
14,
1.5
);

wave += 0.03;

requestAnimationFrame(
animate
);

}

animate();

</script></body>
</html>
